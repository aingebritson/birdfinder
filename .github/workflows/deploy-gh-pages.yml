name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'washtenaw/**'
      - 'oakland/**'
      - 'kent/**'
      - 'wayne/**'
      - 'ottawa/**'
      - 'index.html'
      - 'about.html'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          # Switch to gh-pages branch
          git checkout gh-pages

          # Remove all files except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # Copy landing page, about page, and custom domain config to root
          git checkout main -- index.html
          git checkout main -- about.html
          git checkout main -- CNAME

          # Copy washtenaw app into washtenaw/ subdirectory
          git checkout main -- washtenaw/

          # Copy oakland app into oakland/ subdirectory
          git checkout main -- oakland/

          # Copy kent app into kent/ subdirectory
          git checkout main -- kent/

          # Copy wayne app into wayne/ subdirectory
          git checkout main -- wayne/

          # Copy ottawa app into ottawa/ subdirectory
          git checkout main -- ottawa/

          # Stage all changes
          git add -A

          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from main branch - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin gh-pages
          fi
